name: Publish NuGet Package

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from release tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine package version from release tag"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore CFFITypes.csproj

      - name: Build project
        run: dotnet build CFFITypes.csproj --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Pack NuGet package
        run: dotnet pack CFFITypes.csproj --configuration Release --no-build --output ./artifacts /p:Version=${{ steps.version.outputs.version }}

      - name: Publish package to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbols to NuGet
        run: dotnet nuget push ./artifacts/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
